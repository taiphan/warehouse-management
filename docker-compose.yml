version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wms-postgres
    environment:
      POSTGRES_USER: wms_user
      POSTGRES_PASSWORD: wms_password
      POSTGRES_DB: wms_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wms_user -d wms_db']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wms-redis
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wms-backend
    environment:
      NODE_ENV: development
      PORT: 4001
      DATABASE_URL: postgresql://wms_user:wms_password@postgres:5432/wms_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key-minimum-32-characters-long-here
      JWT_REFRESH_SECRET: dev-refresh-secret-key-minimum-32-chars
      CORS_ORIGINS: http://localhost:3001
      LOG_LEVEL: debug
    ports:
      - '4001:4001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma

volumes:
  postgres_data:
  redis_data:
